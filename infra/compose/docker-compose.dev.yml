services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalai}
      POSTGRES_DB: ${POSTGRES_DB:-legalai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  core-api:
    build:
      context: ../..
      dockerfile: apps/core-api/Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legalai}:${POSTGRES_PASSWORD:-legalai}@postgres:5432/${POSTGRES_DB:-legalai}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: ${CORE_API_URL:-http://core-api:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - core-api

volumes:
  postgres_dev_data:
