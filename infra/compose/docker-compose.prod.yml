services:
  postgres:
    image: postgres:16-alpine
    container_name: legal-ai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalai}
      POSTGRES_DB: ${POSTGRES_DB:-legalai}
      TZ: ${TZ:-Europe/Moscow}
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=1GB
      -c max_connections=30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalai} -d ${POSTGRES_DB:-legalai}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 1g
    memswap_limit: 1g
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: legal-ai-web
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: http://core-api:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://${DOMAIN}}
      TZ: ${TZ:-Europe/Moscow}
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    memswap_limit: 384m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  core-api:
    image: ${CORE_API_IMAGE:-legal-ai-core-api:local}
    build:
      context: ../..
      dockerfile: apps/core-api/Dockerfile
    container_name: legal-ai-core-api
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legalai}:${POSTGRES_PASSWORD:-legalai}@postgres:5432/${POSTGRES_DB:-legalai}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://legalaipro.ru,http://localhost:3000}
      TZ: ${TZ:-Europe/Moscow}
    ports:
      - "${CORE_API_PUBLISH_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode() == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  lead-bot:
    image: ${LEAD_BOT_IMAGE:-legal-ai-lead-bot:local}
    build:
      context: ../..
      dockerfile: apps/lead-bot/legacy/Dockerfile
    container_name: legal-ai-lead-bot
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: http://core-api:8000
      API_KEY_BOT: ${API_KEY_BOT}
      TELEGRAM_BOT_TOKEN: ${LEAD_BOT_TOKEN}
      TZ: ${TZ:-Europe/Moscow}
    depends_on:
      core-api:
        condition: service_healthy
    volumes:
      - lead_bot_data:/app/data
      - lead_bot_logs:/app/logs
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  news-generate:
    build:
      context: ../..
      dockerfile: apps/news/Dockerfile
    container_name: legal-ai-news-generate
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: http://core-api:8000
      API_KEY_NEWS: ${API_KEY_NEWS}
      TELEGRAM_SESSION_NAME: ${TELEGRAM_SESSION_NAME_DOCKER:-/app/data/telegram_bot}
      NEWS_TELEGRAM_CACHE_PATH: ${NEWS_TELEGRAM_CACHE_PATH:-/app/data/news_telegram_cache.json}
      TZ: ${TZ:-Europe/Moscow}
    command: >
      uv run --package news python -m news.generate_loop
    depends_on:
      core-api:
        condition: service_healthy
    volumes:
      - ../../data:/app/data
    mem_limit: 384m
    memswap_limit: 384m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  news-telegram-ingest:
    build:
      context: ../..
      dockerfile: apps/news/Dockerfile
    container_name: legal-ai-news-telegram-ingest
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: http://core-api:8000
      API_KEY_NEWS: ${API_KEY_NEWS}
      TELEGRAM_SESSION_NAME: ${TELEGRAM_SESSION_NAME_DOCKER:-/app/data/telegram_bot}
      NEWS_TELEGRAM_CACHE_PATH: ${NEWS_TELEGRAM_CACHE_PATH:-/app/data/news_telegram_cache.json}
      TZ: ${TZ:-Europe/Moscow}
    command: >
      uv run --package news python -m news.telegram_ingest_loop
    depends_on:
      core-api:
        condition: service_healthy
    volumes:
      - ../../data:/app/data
    mem_limit: 320m
    memswap_limit: 320m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  news-publish:
    build:
      context: ../..
      dockerfile: apps/news/Dockerfile
    container_name: legal-ai-news-publish
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: http://core-api:8000
      API_KEY_NEWS: ${API_KEY_NEWS}
      TZ: ${TZ:-Europe/Moscow}
    command: >
      uv run --package news python -m news.publish_loop
    depends_on:
      core-api:
        condition: service_healthy
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  news-admin-bot:
    build:
      context: ../..
      dockerfile: apps/news/Dockerfile
    container_name: legal-ai-news-admin-bot
    env_file:
      - ../../.env
    environment:
      CORE_API_URL: http://core-api:8000
      API_KEY_NEWS: ${API_KEY_NEWS}
      NEWS_ADMIN_BOT_TOKEN: ${NEWS_ADMIN_BOT_TOKEN}
      NEWS_ADMIN_IDS: ${NEWS_ADMIN_IDS}
      TZ: ${TZ:-Europe/Moscow}
    command: ["uv", "run", "python", "-m", "news.admin_bot"]
    depends_on:
      core-api:
        condition: service_healthy
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  news-reader-bot:
    build:
      context: ../..
      dockerfile: apps/news/legacy/Dockerfile.reader
    container_name: legal-ai-news-reader-bot
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-legalai}:${POSTGRES_PASSWORD:-legalai}@postgres:5432/${POSTGRES_DB:-legalai}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-legalai}
      POSTGRES_USER: ${POSTGRES_USER:-legalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalai}
      READER_BOT_TOKEN: ${READER_BOT_TOKEN}
      TZ: ${TZ:-Europe/Moscow}
    command: ["python", "-u", "-m", "app.reader_bot"]
    depends_on:
      postgres:
        condition: service_healthy
      core-api:
        condition: service_healthy
    mem_limit: 384m
    memswap_limit: 384m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: legal-ai-caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ${CADDYFILE_PATH:-../caddy/Caddyfile}:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      web:
        condition: service_healthy
      core-api:
        condition: service_healthy
    mem_limit: 128m
    memswap_limit: 128m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  lead_bot_data:
  lead_bot_logs:
